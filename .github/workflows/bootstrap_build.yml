name: Bootstrap Build

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: "Release version tag (e.g., 2026.03.20-r1+soul-terminal)"
        required: true
        type: string

jobs:
  build-bootstrap:
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Clone termux-packages
        uses: actions/checkout@v4
        with:
          repository: termux/termux-packages
          path: termux-packages

      - name: Patch for com.soul.terminal
        working-directory: termux-packages
        run: |
          # 1. Change package name in properties
          sed -i 's/^TERMUX_APP__PACKAGE_NAME=.*/TERMUX_APP__PACKAGE_NAME="com.soul.terminal"/' scripts/properties.sh
          grep TERMUX_APP__PACKAGE_NAME scripts/properties.sh

          # 2. Fix profile.d dir not created before write
          sed -i '/chmod 700.*BOOTSTRAP_SECOND_STAGE_ENTRY_POINT_SUBFILE/a\\n\tmkdir -p "${BOOTSTRAP_ROOTFS}/${TERMUX__PREFIX__PROFILE_D_DIR}"' scripts/generate-bootstraps.sh

          # 3. Create helper script for path remapping
          cat > scripts/soul-remap.sh << 'REMAP_EOF'
          #!/bin/bash
          # Called from generate-bootstraps.sh just before create_bootstrap_archive.
          # At this point:
          #   - Packages extracted to ${BOOTSTRAP_ROOTFS}/data/data/com.termux/files/usr/
          #   - Second-stage files in ${BOOTSTRAP_ROOTFS}/data/data/com.soul.terminal/files/usr/
          # We need to merge everything and replace com.termux references.

          TERMUX_TREE="${BOOTSTRAP_ROOTFS}/data/data/com.termux/files/usr"
          SOUL_TREE="${BOOTSTRAP_ROOTFS}/data/data/com.soul.terminal/files/usr"

          if [ ! -d "$TERMUX_TREE" ]; then
              echo "[!] com.termux tree not found, skipping remap"
              return 0
          fi

          # Step 1: Merge second-stage files into com.termux tree
          if [ -d "$SOUL_TREE" ] && [ ! -L "$SOUL_TREE" ]; then
              cp -a "$SOUL_TREE/." "$TERMUX_TREE/"
              rm -rf "$SOUL_TREE"
              echo "[*] Merged second-stage files into com.termux tree"
          fi

          # Step 2: Replace com.termux with com.soul.terminal in text files
          # (TermuxInstaller.java also does this on-device, but doing it here too for safety)
          echo "[*] Replacing com.termux references in text files..."
          REPLACED=0
          while IFS= read -r f; do
              sed -i 's|com\.termux|com.soul.terminal|g' "$f"
              REPLACED=$((REPLACED + 1))
          done < <(grep -rIl 'com\.termux' "$TERMUX_TREE" 2>/dev/null)
          echo "[*] Replaced com.termux in $REPLACED text files"

          # Step 2b: Fix symlinks that point to com.termux paths
          echo "[*] Fixing symlink targets containing com.termux..."
          FIXED_LINKS=0
          while IFS= read -r -d '' lnk; do
              target=$(readlink "$lnk")
              if [[ "$target" == *com.termux* ]]; then
                  new_target="${target//com.termux/com.soul.terminal}"
                  ln -sfn "$new_target" "$lnk"
                  FIXED_LINKS=$((FIXED_LINKS + 1))
              fi
          done < <(find "$TERMUX_TREE" -type l -print0)
          echo "[*] Fixed $FIXED_LINKS symlinks"

          # Step 3: Binary-patch ELF files with same-length path substitution
          # /data/data/com.termux/files/usr = 31 chars
          # /data/data/com.soul.terminal/tu = 31 chars (exact same length!)
          # On device, TermuxInstaller creates symlink: /tu -> files/usr
          OLD_PREFIX="/data/data/com.termux/files/usr"
          NEW_PREFIX="/data/data/com.soul.terminal/tu"
          echo "[*] Binary-patching ELF files: $OLD_PREFIX -> $NEW_PREFIX"
          PATCHED=0
          while IFS= read -r -d '' f; do
              # Check for ELF magic bytes
              if head -c4 "$f" | grep -q $'\x7fELF'; then
                  if grep -q "$OLD_PREFIX" "$f" 2>/dev/null; then
                      # Use perl for safe binary replacement (same length, no byte shift)
                      perl -pi -e "s|\Q$OLD_PREFIX\E|$NEW_PREFIX|g" "$f"
                      PATCHED=$((PATCHED + 1))
                  fi
              fi
          done < <(find "$TERMUX_TREE" -type f -print0)
          echo "[*] Binary-patched $PATCHED ELF files"

          # Step 4: Fix apt paths hardcoded with com.termux in the binary.
          # The binary-patch only covers /data/data/com.termux/files/usr (31 chars).
          # Other compiled-in paths (cache dir, keyring) need config overrides.
          mkdir -p "$TERMUX_TREE/etc/apt/apt.conf.d"
          cat > "$TERMUX_TREE/etc/apt/apt.conf.d/99soul-paths.conf" << APTCONF
          Dir::Cache "/data/data/com.soul.terminal/cache/apt";
          Dir::Etc::trusted "/data/data/com.soul.terminal/files/usr/etc/apt/trusted.gpg";
          Dir::Etc::trustedparts "/data/data/com.soul.terminal/files/usr/etc/apt/trusted.gpg.d";
          Dir::Log "/data/data/com.soul.terminal/cache/apt/log";
          APTCONF
          echo "[*] APT keyring files:"
          ls -la "$TERMUX_TREE/etc/apt/trusted.gpg.d/" 2>/dev/null || echo "  (none found)"

          # Step 5: Symlink com.soul.terminal -> com.termux so create_bootstrap_archive finds everything
          mkdir -p "${BOOTSTRAP_ROOTFS}/data/data/com.soul.terminal/files"
          ln -sfn "$TERMUX_TREE" "$SOUL_TREE"
          echo "[*] Symlinked com.soul.terminal/files/usr -> com.termux/files/usr"
          REMAP_EOF
          chmod +x scripts/soul-remap.sh

          # 4. Insert call to remap script before create_bootstrap_archive
          sed -i '/create_bootstrap_archive "\$package_arch"/i\\n\tsource scripts/soul-remap.sh' scripts/generate-bootstraps.sh

          echo "All patches applied"

      - name: Enable FUSE on host
        run: |
          sudo apt-get install -y fuse3
          sudo modprobe fuse || true
          ls -la /dev/fuse

      - name: Assemble bootstrap zip
        working-directory: termux-packages
        run: |
          docker run --rm --privileged \
            --device /dev/fuse \
            -v "$PWD:/home/builder/termux-packages" \
            -w /home/builder/termux-packages \
            ghcr.io/termux/package-builder \
            bash -c "./scripts/generate-bootstraps.sh --architectures aarch64"
          mv bootstrap-aarch64.zip ../

      - name: Verify bootstrap zip contents
        run: |
          echo "=== Zip file size ==="
          ls -lh bootstrap-aarch64.zip
          echo "=== SYMLINKS.txt content (first 30 lines) ==="
          unzip -p bootstrap-aarch64.zip SYMLINKS.txt | head -30
          echo "=== SYMLINKS.txt line count ==="
          unzip -p bootstrap-aarch64.zip SYMLINKS.txt | wc -l
          echo "=== Zip entry count ==="
          unzip -l bootstrap-aarch64.zip | tail -1
          echo "=== Check for remaining com.termux references in SYMLINKS.txt ==="
          unzip -p bootstrap-aarch64.zip SYMLINKS.txt | grep -c 'com\.termux' || echo "0 (clean)"

      - name: Compute SHA-256
        id: checksum
        run: |
          CHECKSUM=$(sha256sum bootstrap-aarch64.zip | cut -d' ' -f1)
          echo "sha256=$CHECKSUM" >> "$GITHUB_OUTPUT"
          echo "Bootstrap aarch64 SHA-256: $CHECKSUM"

      - name: Import GPG key and sign
        env:
          GPG_PRIVATE_KEY: ${{ secrets.SOUL_GPG_PRIVATE_KEY }}
        run: |
          if [ -n "$GPG_PRIVATE_KEY" ]; then
            echo "$GPG_PRIVATE_KEY" | gpg --batch --import
            gpg --batch --yes --detach-sign --armor bootstrap-aarch64.zip
            echo "GPG signing done"
          else
            echo "No GPG key configured, skipping signing"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "bootstrap-${{ github.event.inputs.version_tag }}"
          name: "Bootstrap ${{ github.event.inputs.version_tag }}"
          body: |
            Bootstrap packages voor SOUL Terminal (com.soul.terminal)
            Architectuur: aarch64
            SHA-256: ${{ steps.checksum.outputs.sha256 }}
          files: |
            bootstrap-aarch64.zip
            bootstrap-aarch64.zip.asc
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Output checksum for app integration
        run: |
          echo "============================================"
          echo "UPDATE app/build.gradle met:"
          echo "  version: \"${{ github.event.inputs.version_tag }}\""
          echo "  checksum: \"${{ steps.checksum.outputs.sha256 }}\""
          echo "============================================"
