include ':app', ':termux-shared', ':terminal-emulator', ':terminal-view'

// Flutter module source inclusion (conditional — only when flutter_module is built)
def flutterInclude = new File(settingsDir, 'flutter_module/.android/include_flutter.groovy')
if (flutterInclude.exists()) {
    setBinding(new Binding([gradle: this]))
    evaluate(flutterInclude)
}
