name: Bootstrap Build

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: "Release version tag (e.g., 2026.03.20-r1+soul-terminal)"
        required: true
        type: string

jobs:
  build-bootstrap:
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Clone termux-packages
        uses: actions/checkout@v4
        with:
          repository: termux/termux-packages
          path: termux-packages

      - name: Patch for com.soul.terminal
        working-directory: termux-packages
        run: |
          # 1. Change package name in properties
          sed -i 's/^TERMUX_APP__PACKAGE_NAME=.*/TERMUX_APP__PACKAGE_NAME="com.soul.terminal"/' scripts/properties.sh
          grep TERMUX_APP__PACKAGE_NAME scripts/properties.sh

          # 2. Fix profile.d dir not created before write
          sed -i '/chmod 700.*BOOTSTRAP_SECOND_STAGE_ENTRY_POINT_SUBFILE/a\\n\tmkdir -p "${BOOTSTRAP_ROOTFS}/${TERMUX__PREFIX__PROFILE_D_DIR}"' scripts/generate-bootstraps.sh

          # 3. After packages are extracted (com.termux paths), symlink to com.soul.terminal
          #    Match the function CALL (with "$package_arch" arg), not the definition (with "() {")
          sed -i '/create_bootstrap_archive "\$package_arch"/i\\n\t# Symlink com.termux -> com.soul.terminal so create_bootstrap_archive finds everything\n\tif [ -d "${BOOTSTRAP_ROOTFS}/data/data/com.termux/files/usr" ] && [ ! -e "${BOOTSTRAP_ROOTFS}/data/data/com.soul.terminal" ]; then\n\t\tmkdir -p "${BOOTSTRAP_ROOTFS}/data/data/com.soul.terminal/files"\n\t\tln -sfn "${BOOTSTRAP_ROOTFS}/data/data/com.termux/files/usr" "${BOOTSTRAP_ROOTFS}/data/data/com.soul.terminal/files/usr"\n\t\techo "[*] Symlinked com.soul.terminal/files/usr -> com.termux/files/usr"\n\tfi' scripts/generate-bootstraps.sh

          # Debug: verify patches applied
          echo "=== grep create_bootstrap_archive ==="
          grep -n 'create_bootstrap_archive' scripts/generate-bootstraps.sh
          echo "=== grep Symlink ==="
          grep -n 'Symlink' scripts/generate-bootstraps.sh || echo "Symlink patch NOT found!"
          echo "All patches applied"

      - name: Enable FUSE on host
        run: |
          sudo apt-get install -y fuse3
          sudo modprobe fuse || true
          ls -la /dev/fuse

      - name: Assemble bootstrap zip
        working-directory: termux-packages
        run: |
          docker run --rm --privileged \
            --device /dev/fuse \
            -v "$PWD:/home/builder/termux-packages" \
            -w /home/builder/termux-packages \
            ghcr.io/termux/package-builder \
            bash -c "./scripts/generate-bootstraps.sh --architectures aarch64"
          mv bootstrap-aarch64.zip ../

      - name: Verify bootstrap zip contents
        run: |
          echo "=== Zip file size ==="
          ls -lh bootstrap-aarch64.zip
          echo "=== SYMLINKS.txt content (first 30 lines) ==="
          unzip -p bootstrap-aarch64.zip SYMLINKS.txt | head -30
          echo "=== SYMLINKS.txt line count ==="
          unzip -p bootstrap-aarch64.zip SYMLINKS.txt | wc -l
          echo "=== Zip entry count ==="
          unzip -l bootstrap-aarch64.zip | tail -1

      - name: Compute SHA-256
        id: checksum
        run: |
          CHECKSUM=$(sha256sum bootstrap-aarch64.zip | cut -d' ' -f1)
          echo "sha256=$CHECKSUM" >> "$GITHUB_OUTPUT"
          echo "Bootstrap aarch64 SHA-256: $CHECKSUM"

      - name: Import GPG key and sign
        env:
          GPG_PRIVATE_KEY: ${{ secrets.SOUL_GPG_PRIVATE_KEY }}
        run: |
          if [ -n "$GPG_PRIVATE_KEY" ]; then
            echo "$GPG_PRIVATE_KEY" | gpg --batch --import
            gpg --batch --yes --detach-sign --armor bootstrap-aarch64.zip
            echo "GPG signing done"
          else
            echo "No GPG key configured, skipping signing"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "bootstrap-${{ github.event.inputs.version_tag }}"
          name: "Bootstrap ${{ github.event.inputs.version_tag }}"
          body: |
            Bootstrap packages voor SOUL Terminal (com.soul.terminal)
            Architectuur: aarch64
            SHA-256: ${{ steps.checksum.outputs.sha256 }}
          files: |
            bootstrap-aarch64.zip
            bootstrap-aarch64.zip.asc
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Output checksum for app integration
        run: |
          echo "============================================"
          echo "UPDATE app/build.gradle met:"
          echo "  version: \"${{ github.event.inputs.version_tag }}\""
          echo "  checksum: \"${{ steps.checksum.outputs.sha256 }}\""
          echo "============================================"
